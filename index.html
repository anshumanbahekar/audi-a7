
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes revealDark{0%{opacity:1}100%{opacity:0;pointer-events:none}}
@keyframes hPulse{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes glowBreath{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes rainDrop{0%{transform:translateY(-30px);opacity:0}10%{opacity:1}100%{transform:translateY(600px);opacity:0}}
@keyframes scanMove{0%{top:-80px}100%{top:120%}}
@keyframes logoGlow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes flicker{0%,94%,100%{opacity:1}95%,97%{opacity:.5}}
@keyframes rimPulse{0%,100%{box-shadow:0 0 6px 1px rgba(88,174,255,.25)}50%{box-shadow:0 0 18px 5px rgba(88,174,255,.6)}}
@keyframes floatCar{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
@keyframes beamOn{from{opacity:0}to{opacity:1}}
@keyframes roadRush{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes speedLine{from{transform:translateX(120%);opacity:.6}to{transform:translateX(-120%);opacity:0}}
@keyframes exhaustPuff{0%{transform:translateY(0) scale(1);opacity:.5}100%{transform:translateY(-25px) scale(2.5);opacity:0}}
@keyframes tireRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes holoPulse{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:.9;transform:scaleY(1.02)}}
@keyframes neonTrace{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes ambientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:var(--font-sans,sans-serif)}

.masterScene{width:100%;max-width:740px;position:relative;background:#000;border-radius:20px;overflow:hidden;padding:0 0 8px}

.rainLayer{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden}

.roadWrap{position:absolute;bottom:0;left:0;right:0;height:52px;z-index:4;overflow:hidden}

.rl{height:2px;width:8%;background:linear-gradient(to right,transparent,rgba(88,174,255,.12),transparent);flex-shrink:0;margin-right:8%}

.speedLines{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden}

.l1{top:11%;width:72%}.l2{top:22%}.l3{width:78%;top:33%}.l4{width:76%;top:44%}.l5{height:1.9%;width:72%;top:55%}.l6{height:1%;width:65%;top:66%}.l7{height:3%;width:60%;background:transparent;border-top:1px solid rgba(88,174,255,.2);border-bottom:1px solid rgba(88,174,255,.2);bottom:7%}

.holoHUD{position:relative;z-index:20;margin:0 auto;width:88%;max-width:580px;padding:10px 0 0;animation:slideUp .8s 2.4s ease both}
.holoRow{display:flex;justify-content:space-between;align-items:stretch;gap:8px;margin-bottom:8px}
.holoCard{flex:1;background:rgba(88,174,255,.04);border:1px solid rgba(88,174,255,.14);border-radius:8px;padding:8px 10px;position:relative;overflow:hidden}
.holoCard::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(88,174,255,.5),transparent)}
.holoCard::after{content:"";position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(88,174,255,.04))}
.hLabel{font-size:9px;letter-spacing:.14em;color:rgba(88,174,255,.45);text-transform:uppercase;margin-bottom:3px}
.hVal{font-size:18px;font-weight:500;color:rgba(88,174,255,.9);letter-spacing:.04em;line-height:1;animation:logoGlow 3s ease-in-out infinite}
.hUnit{font-size:9px;color:rgba(88,174,255,.4);margin-left:2px;letter-spacing:.08em}
.hBar{height:2px;background:rgba(88,174,255,.12);border-radius:1px;margin-top:5px;overflow:hidden}
.hBarFill{height:100%;border-radius:1px;background:linear-gradient(to right,rgba(88,174,255,.3),rgba(88,174,255,.9));transition:width .6s ease}

.rpmGauge{width:72px;height:72px;position:relative;margin:0 auto}
.rpmSvg{width:100%;height:100%}

.modelBadge{display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:8px;animation:slideUp .8s 2.7s ease both}
.mName{font-size:12px;letter-spacing:.2em;color:rgba(255,255,255,.2);text-transform:uppercase}
.mName span{color:rgba(88,174,255,.7);font-weight:500}
.mYear{font-size:10px;color:rgba(88,174,255,.3);letter-spacing:.15em}

.colorRow{display:flex;align-items:center;gap:8px;animation:slideUp .8s 3s ease both;padding:0 2px}
.cLabel{font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.2);text-transform:uppercase;flex:1}
.dots{display:flex;gap:7px}
.dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:all .2s;flex-shrink:0}
.dot:hover,.dot.on{border-color:rgba(255,255,255,.6);transform:scale(1.3)}
.dot[data-c=blue]{background:radial-gradient(#58aeff,#0a2a5e)}
.dot[data-c=red]{background:radial-gradient(#ff4444,#5e0a0a)}
.dot[data-c=green]{background:radial-gradient(#44ff88,#0a3e1a)}
.dot[data-c=white]{background:radial-gradient(#fff,#bbb)}
.dot[data-c=gold]{background:radial-gradient(#ffd700,#7a5a00)}
.dot[data-c=purple]{background:radial-gradient(#cc88ff,#3a0a6e)}
.dot[data-c=orange]{background:radial-gradient(#ff8844,#6e2a0a)}

.modeRow{display:flex;gap:6px;margin-top:8px;animation:slideUp .8s 3.2s ease both}

.modeBtn:hover,.modeBtn.on{background:rgba(88,174,255,.1);border-color:rgba(88,174,255,.4);color:rgba(88,174,255,.9)}

.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:110;border-radius:20px}

<script>
const rl=document.getElementById('rl');
for(let i=0;i<65;i++){
  const d=document.createElement('div');d.className='rd';
  const dur=.5+Math.random()*1.2,h=15+Math.random()*55;
  d.style.cssText=`left:${Math.random()*100}%;height:${h}px;width:${.5+Math.random()*.9}px;background:linear-gradient(to bottom,transparent,rgba(88,174,255,${.1+Math.random()*.2}),transparent);animation-duration:${dur}s;animation-delay:${Math.random()*2}s;animation-name:rainDrop;animation-timing-function:linear;animation-iteration-count:infinite`;
  rl.appendChild(d);
}

const spd=document.getElementById('spd');
for(let i=0;i<12;i++){
  const s=document.createElement('div');s.className='sl';
  const w=60+Math.random()*140;
  s.style.cssText=`width:${w}px;top:${Math.random()*100}%;left:${Math.random()*60+20}%;animation-duration:${.8+Math.random()*.8}s;animation-delay:${Math.random()*1.5}s;opacity:${.06+Math.random()*.1}`;
  spd.appendChild(s);
}

const rlines=document.getElementById('rlines');
for(let i=0;i<14;i++){
  const r=document.createElement('div');r.className='rl';rlines.appendChild(r);
}

let animFrame,speed=0,rpm=0,targetSpeed=160,targetRpm=5200,running=true;
function animDash(){
  speed=speed+(targetSpeed-speed)*.025;
  rpm=rpm+(targetRpm-rpm)*.025;
  document.getElementById('speedVal').innerHTML=Math.round(speed)+'<span class="hUnit">km/h</span>';
  document.getElementById('speedBar').style.width=(speed/250*100)+'%';
  const rpmPct=rpm/7200;
  document.getElementById('rpmBar').style.width=(rpmPct*100)+'%';
  document.getElementById('rpmArc').style.strokeDashoffset=(176-(176*rpmPct));
  document.getElementById('rpmText').textContent=Math.round(rpm/100)/10+'k';
  if(running)requestAnimationFrame(animDash);
}
setTimeout(()=>animDash(),2200);

let wheelAngle=0;
function spinWheels(){
  wheelAngle=(wheelAngle+3)%360;
  ['wsL','wsR'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.transform=`rotate(${wheelAngle}deg)`;
  });
  requestAnimationFrame(spinWheels);
}
spinWheels();

const colorMap={
  blue:{g:'rgba(88,174,255,.95)',r:'rgba(88,174,255,.78)',s:'rgba(88,174,255,.9)'},
  red:{g:'rgba(255,70,70,.9)',r:'rgba(255,70,70,.75)',s:'rgba(255,100,100,.9)'},
  green:{g:'rgba(50,255,130,.85)',r:'rgba(50,255,130,.72)',s:'rgba(60,255,140,.9)'},
  white:{g:'rgba(255,255,255,.85)',r:'rgba(255,255,255,.7)',s:'rgba(255,255,255,.9)'},
  gold:{g:'rgba(255,210,60,.9)',r:'rgba(255,210,60,.75)',s:'rgba(255,218,80,.9)'},
  purple:{g:'rgba(180,80,255,.88)',r:'rgba(180,80,255,.72)',s:'rgba(190,100,255,.9)'},
  orange:{g:'rgba(255,140,50,.9)',r:'rgba(255,140,50,.75)',s:'rgba(255,160,70,.9)'}
};

function applyColor(c){
  const p=colorMap[c];
  document.querySelectorAll('.glo').forEach(el=>{el.style.background=`radial-gradient(#fff 4%,${p.g} 22%,rgba(0,0,172,.6) 52%,transparent 88%)`});
  document.querySelectorAll('.mb').forEach(el=>{el.style.borderColor=`transparent transparent ${p.r} ${p.r}`});
  document.querySelectorAll('.roofStrip,.wft,.drl').forEach(el=>{el.style.boxShadow=`0 0 12px ${p.r}`});
  document.querySelectorAll('.ci').forEach(el=>{el.style.boxShadow=`0 0 5px ${p.r},inset 0 0 5px ${p.r.replace('.72','.1').replace('.75','.1').replace('.7','.1')}`});
  document.querySelectorAll('.hVal,.hBarFill').forEach(el=>{el.style.color=p.s});
  document.querySelectorAll('.hBarFill').forEach(el=>{if(!el.style.background.includes('gradient(to right,rgba(88'))el.style.background=`linear-gradient(to right,${p.r.replace('.78','.3').replace('.72','.3').replace('.75','.3').replace('.7','.3').replace('.88','.3').replace('.85','.3').replace('.9','.3')},${p.g})`});
  document.getElementById('rpmArc').style.stroke=p.r;
  document.getElementById('rpmText').style.fill=p.s;
  document.querySelectorAll('.wheelCenter').forEach(el=>{el.style.background=`radial-gradient(${p.r},rgba(0,0,0,.5))`});
  document.querySelectorAll('.wheelSpoke::before,.wheelSpoke::after').forEach(el=>{el.style.background=p.r});
  document.querySelectorAll('.roadGlow,.underGlow').forEach(el=>{el.style.background=`radial-gradient(ellipse at 50% 0%,${p.r.replace('.78','.18').replace('.72','.16').replace('.75','.16').replace('.7','.16').replace('.88','.16').replace('.85','.15').replace('.9','.15')},transparent 70%)`});
}

document.getElementById('dots').addEventListener('click',e=>{
  const dot=e.target.closest('.dot');if(!dot)return;
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('on'));
  dot.classList.add('on');applyColor(dot.dataset.c);
});

const modes={
  sport:{speed:160,rpm:5200},
  comfort:{speed:80,rpm:2800},
  dynamic:{speed:220,rpm:6800},
  eco:{speed:60,rpm:1800},
  offroad:{speed:40,rpm:3200}
};
document.getElementById('modeRow').addEventListener('click',e=>{
  const btn=e.target.closest('.modeBtn');if(!btn)return;
  document.querySelectorAll('.modeBtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const m=modes[btn.dataset.m];
  targetSpeed=m.speed;targetRpm=m.rpm;
  const spd=document.getElementById('spd');
  const intensity=m.speed/250;
  spd.querySelectorAll('.sl').forEach(s=>{
    s.style.animationDuration=((.8+Math.random()*.8)*(1-intensity*.5))+'s';
    s.style.opacity=((.06+Math.random()*.1)*intensity*2);
  });
});
</script>
